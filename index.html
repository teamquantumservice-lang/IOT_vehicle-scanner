<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f4f7f6; text-align: center; }
    #reader { width: 100%; max-width: 400px; margin: auto; background: white; border: 1px solid #ccc; }
    .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; text-align: left; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    th, td { padding: 8px; border-bottom: 1px solid #ddd; }
  </style>
</head>
<body>
  <h2>Vehicle Scanner</h2>
  <div id="reader"></div>
  
  <div class="card">
    <h3>Today's Activity</h3>
    <table>
      <thead><tr><th>VIN</th><th>Status</th></tr></thead>
      <tbody id="dashBody"></tbody>
    </table>
  </div>

  <script>
    // REPLACE THIS URL WITH YOUR NEW WEB APP URL
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwFiuztGDMkzTjWU4QibcreMlMz-VL6hY3kgRLGM2czxwHnSrujbEXVQ-RjftFF7EMQGg/exec";

    const html5QrCode = new Html5Qrcode("reader");
    
    // Start camera with proper environment settings
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
      (decodedText) => {
        // Send to Sheet
        fetch(WEB_APP_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "SUBMIT_VIN", vin: decodedText })
        }).then(() => {
          updateDashboard(); // Refresh immediately
        });
        html5QrCode.pause(); // Pause to prevent duplicate scans
        alert("Scanned: " + decodedText);
        setTimeout(() => html5QrCode.resume(), 2000); // Resume after 2 seconds
      });

    async function updateDashboard() {
      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "GET_DASHBOARD" })
        });
        const data = await response.json();
        document.getElementById('dashBody').innerHTML = data.map(row => 
          `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`).join('');
      } catch (e) {
        console.error("Dashboard update failed", e);
      }
    }
    
    setInterval(updateDashboard, 5000);
    updateDashboard();
  </script>
</body>
</html>
